<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <style>
    @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
    
    body {
      width: 380px;
      margin: 0;
      padding: 0;
      font-family: 'Pretendard', sans-serif;
      background: #f1f5f9;
      color: #1e293b;
    }
    .card {
      background: white;
      margin: 16px;
      border-radius: 28px;
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.7);
    }
    .header {
      padding: 24px;
      background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
      color: white;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .header-title {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .logo-box {
      width: 36px;
      height: 36px;
      background: rgba(255,255,255,0.2);
      backdrop-filter: blur(8px);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
    }
    .logo-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    h2 { margin: 0; font-size: 18px; font-weight: 800; letter-spacing: -0.5px; }
    
    .content { padding: 24px; }
    
    .status-section {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
      padding: 12px 16px;
      background: #f8fafc;
      border-radius: 16px;
      border: 1px solid #e2e8f0;
    }
    .status-info { display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 700; }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #cbd5e1; }
    .status-dot.active { background: #10b981; box-shadow: 0 0 10px rgba(16,185,129,0.5); animation: pulse 2s infinite; }
    @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.2); } 100% { transform: scale(1); } }
    
    .action-group { display: flex; flex-direction: column; gap: 12px; }
    
    .btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 16px;
      font-weight: 800;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .btn-primary { 
      background: #2563eb; 
      color: white; 
      box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.2);
    }
    .btn-primary:hover { background: #1d4ed8; transform: translateY(-2px); }
    .btn-primary:active { transform: scale(0.98); }
    .btn-primary:disabled { background: #94a3b8; cursor: not-allowed; transform: none; }
    
    .btn-outline {
      background: white;
      color: #475569;
      border: 1px solid #e2e8f0;
    }
    .btn-outline:hover { background: #f8fafc; color: #1e293b; border-color: #cbd5e1; }
    
    .data-preview {
      margin-top: 24px;
      padding: 16px;
      background: #1e293b;
      border-radius: 16px;
      max-height: 150px;
      overflow-y: auto;
      font-family: 'monospace';
      font-size: 11px;
      color: #94a3b8;
      white-space: pre-wrap;
    }
    .footer { text-align: center; padding: 16px; font-size: 11px; color: #94a3b8; font-weight: 600; }
  </style>
</head>
<body>
  <div class="card">
    <div class="header">
      <div class="header-title">
        <div class="logo-box">
          <img src="icons/logo.png" alt="Logo" class="logo-img">
        </div>
        <h2>OneResume Connect</h2>
      </div>
    </div>

    <div class="content">
      <div class="status-section">
        <div class="status-info">
          <div id="status-dot" class="status-dot"></div>
          <span id="status-text">연동 상태 확인 중...</span>
        </div>
        <div id="last-sync" style="font-size: 10px; color: #94a3b8;"></div>
      </div>

      <div class="action-group">
        <button id="autofill-btn" class="btn btn-primary" disabled>
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22v-7l-2-2m0 0l-2-2m2 2l2-2m-2 2l-2 2"/><path d="M11 2h2a2 2 0 0 1 2 2v1l1 1h3a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2h-3l-1 1v1a2 2 0 0 1-2 2h-2a2 2 0 0 1-2-2v-1l-1-1H4a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h3l1-1V4a2 2 0 0 1 2-2z"/></svg>
          현재 페이지에 자동 입력
        </button>
        <button id="refresh-btn" class="btn btn-outline">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 2v6h-6"/><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M3 22v-6h6"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/></svg>
          이력서 데이터 새로고침
        </button>
      </div>

      <div id="data-display" class="data-preview">
        웹사이트에서 [원클릭 동기화]를 진행하면 여기에 데이터가 나타납니다.
      </div>
    </div>
    
    <div class="footer">
      Powered by OneResume Engine © 2026
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
