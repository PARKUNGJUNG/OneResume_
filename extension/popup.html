<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <style>
    @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
    
    :root {
      --bg: #ffffff;
      --text: #1e293b;
      --text-muted: #64748b;
      --accent: #2563eb;
      --status-bg: #f8fafc;
      --status-border: #e2e8f0;
      --badge-bg: #f1f5f9;
      --btn-outline-bg: #ffffff;
      --btn-outline-text: #475569;
      --preview-bg: #f8fafc;
      --preview-text: #475569;
      --header-grad: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #18181b;
        --text: #f8fafc;
        --text-muted: #a1a1aa;
        --accent: #60a5fa;
        --status-bg: #27272a;
        --status-border: #3f3f46;
        --badge-bg: #18181b;
        --btn-outline-bg: #27272a;
        --btn-outline-text: #d4d4d8;
        --preview-bg: #27272a;
        --preview-text: #f8fafc;
        --header-grad: linear-gradient(135deg, #27272a 0%, #18181b 100%);
      }
    }

    body {
      width: 380px;
      margin: 0;
      padding: 0;
      font-family: 'Pretendard', sans-serif;
      background: var(--bg);
      color: var(--text);
      transition: background 0.3s, color 0.3s;
    }
    .card {
      background: var(--bg);
      margin: 0;
      border-radius: 0;
      overflow: hidden;
      min-height: 480px;
      display: flex;
      flex-direction: column;
    }
    .header {
      padding: 26px 24px;
      background: var(--header-grad);
      color: white;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .header-title {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    
    /* [사진 디자인 반영] iOS/Modern 스타일 토글 */
    .toggle-container {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .toggle-label {
      font-size: 12px;
      font-weight: 700;
      color: rgba(255,255,255,0.9);
    }
    .switch {
      position: relative;
      display: inline-block;
      width: 44px;
      height: 24px;
    }
    .switch input { 
      opacity: 0;
      width: 0;
      height: 0;
    }
    .slider {
      position: absolute;
      cursor: pointer;
      top: 0; left: 0; right: 0; bottom: 0;
      background-color: #cbd5e1; /* 확실한 회색 배경 (비활성화 느낌) */
      transition: .4s;
      border-radius: 24px;
    }
    .slider:before {
      position: absolute;
      content: "";
      height: 18px;
      width: 18px;
      left: 3px;
      bottom: 3px;
      background-color: white; /* 비활성 시 흰색 노브 */
      transition: .4s cubic-bezier(0.4, 0, 0.2, 1);
      border-radius: 50%;
      box-shadow: 0 1px 2px rgba(0,0,0,0.2);
    }
    input:checked + .slider {
      background-color: #bfdbfe; /* 사진의 연한 블루 배경 */
    }
    input:checked + .slider:before {
      transform: translateX(20px);
      background-color: #1e3a8a; /* 사진의 진한 블루 노브 */
    }

    .logo-box {
      width: 40px;
      height: 40px;
      background: rgba(255,255,255,0.2);
      backdrop-filter: blur(8px);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
    }
    .logo-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    h2 { margin: 0; font-size: 20px; font-weight: 800; letter-spacing: -0.5px; }
    
    .content { 
      padding: 20px; 
      flex: 1; 
      display: flex; 
      flex-direction: column;
      position: relative;
    }
    
    /* [수정] 비활성화 마스크 스타일 - 양방향 페이드 & 블러 전환 효과 */
    #disabled-mask {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(255, 255, 255, 0.3);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      z-index: 100;
      display: flex; /* 항상 flex 유지 */
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding-top: 20px;
      gap: 12px;
      color: #1e293b;
      
      /* 양방향 애니메이션 핵심 */
      opacity: 0;
      visibility: hidden;
      pointer-events: none; /* 꺼져있을 땐 클릭 방해 안 함 */
      transition: opacity 0.4s cubic-bezier(0.4, 0, 0.2, 1), 
                  visibility 0.4s, 
                  backdrop-filter 0.4s;
    }
    
    /* 활성화 시 스타일 */
    #disabled-mask.active {
      opacity: 1;
      visibility: visible;
      pointer-events: auto; /* 마스크 떴을 땐 클릭 차단 */
    }
    
    .status-section {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
      padding: 12px 16px;
      background: var(--status-bg);
      border-radius: 16px;
      border: 1px solid var(--status-border);
    }
    .status-info { display: flex; align-items: center; gap: 10px; font-size: 14px; font-weight: 700; }
    .status-dot { width: 10px; height: 10px; border-radius: 50%; background: #cbd5e1; }
    .status-dot.active { background: #10b981; box-shadow: 0 0 10px rgba(16,185,129,0.5); animation: pulse 2s infinite; }
    @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.2); } 100% { transform: scale(1); } }
    
    .user-name { color: var(--accent); font-weight: 800; }
    .sync-badge { font-size: 11px; color: var(--text-muted); font-weight: 600; }

    .action-group { display: flex; flex-direction: column; gap: 12px; margin-bottom: 20px; }
    
    .btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 16px;
      font-weight: 800;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    .btn-primary { 
      background: #2563eb; 
      color: white; 
      box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.2);
    }
    .btn-primary:hover { background: #1d4ed8; transform: translateY(-2px); }
    .btn-primary:active { transform: scale(0.98); }
    .btn-primary:disabled { background: #94a3b8; cursor: not-allowed; transform: none; }
    
    .brand-text {
      font-weight: 900;
      letter-spacing: -0.5px;
    }
    
    .btn-outline {
      background: var(--btn-outline-bg);
      color: var(--btn-outline-text);
      border: 1px solid var(--status-border);
    }
    .btn-outline:hover { background: var(--status-bg); border-color: var(--text-muted); }
    
    .data-preview {
      padding: 16px;
      background: var(--preview-bg);
      border-radius: 18px;
      max-height: 120px;
      overflow-y: auto;
      font-family: 'Pretendard', sans-serif;
      font-size: 14px;
      color: var(--text);
      white-space: pre-wrap;
      line-height: 1.6;
      border: 1px solid var(--status-border);
      text-align: center;
    }
    .footer { text-align: center; padding: 12px; font-size: 11px; color: var(--text-muted); font-weight: 600; }
  </style>
</head>
<body>
  <div class="card">
    <div class="header">
      <div class="header-title">
        <div class="logo-box">
          <img src="icons/logo128.png" alt="Logo" class="logo-img">
        </div>
        <h2>OneResume Connect</h2>
      </div>
      <div class="toggle-container">
        <label class="switch">
          <input type="checkbox" id="master-toggle" checked>
          <span class="slider"></span>
        </label>
      </div>
    </div>

    <div class="content">
      <!-- 비활성화 마스크 -->
      <div id="disabled-mask">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        <span style="font-weight: 700; font-size: 15px;">연동 기능이 꺼져 있습니다</span>
      </div>

      <div id="main-ui">
        <div class="status-section">
          <div class="status-info">
            <div id="status-dot" class="status-dot"></div>
            <span id="status-text">연동 상태 확인 중...</span>
          </div>
          <div id="last-sync" class="sync-badge"></div>
        </div>

        <div class="action-group">
          <button id="autofill-btn" class="btn btn-primary" disabled>
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="18" x2="12" y2="12"/><polyline points="9 15 12 12 15 15"/></svg>
            현재 페이지에 자동 입력
          </button>
          <button id="refresh-btn" class="btn btn-outline">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 2v6h-6"/><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M3 22v-6h6"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/></svg>
            데이터 새로고침
          </button>
        </div>

        <div id="data-display" class="data-preview">웹사이트에서 [원클릭 동기화]를 진행하면 여기에 데이터가 나타납니다.</div>
      </div>

      <div id="error-ui" style="display: none; flex-direction: column; gap: 20px; align-items: center; text-align: center; padding: 20px 0;">
        <div style="background: rgba(239, 68, 68, 0.1); padding: 20px; border-radius: 50%; color: #ef4444;">
          <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><path d="M12 9v4"/><path d="M12 17h.01"/></svg>
        </div>
        <div>
          <h3 style="margin: 0 0 8px 0;">세션이 만료되었습니다</h3>
          <p style="margin: 0; font-size: 14px; color: var(--text-muted);">홈페이지에서 다시 [원클릭 동기화]를<br>진행해주시기 바랍니다.</p>
        </div>
        <button id="go-home-btn" class="btn btn-primary">
          <span class="brand-text">OneResume</span> 홈페이지로 이동
        </button>
      </div>
    </div>
    
    <div class="footer">
      Powered by OneResume Engine © 2026<br>
      Created by 박정웅
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
