name: Sync to Personal Repo

on:
  push:
    branches:
      - main

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Push to Personal Repo
        run: |
          git remote add personal https://${{ secrets.PERSONAL_TOKEN }}@github.com/PARKUNGJUNG/OneResume_.git
          git push -f personal main
