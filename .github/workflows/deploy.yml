name: OneResume CI/CD

on:
  push:
    branches: [ "main" ] # 메인 브랜치에 코드가 올라오면 시작.

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      # 백엔드(EC2) 배포 단계
      - name: Deploy Backend to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # 1. 프로젝트 폴더로 이동
            cd ~/OneResume 
            
            # 2. 최신 코드 강제 동기화 (충돌 방지)
            git fetch origin main
            git reset --hard origin/main
            
            # 3. 백엔드 설정 및 실행
            cd backend
            npm install
            
            # 금고(Secrets)에서 꺼내서 .env 파일 만들기
            echo "DATABASE_URL=${{ secrets.DB_URL }}" > .env
            echo "JWT_SECRET=${{ secrets.JWT_SECRET }}" >> .env
            echo "AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}" >> .env
            echo "AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}" >> .env
            echo "EMAIL_USER=${{ secrets.EMAIL_USER }}" >> .env
            echo "EMAIL_PASS=${{ secrets.EMAIL_PASS }}" >> .env
            echo "AWS_REGION=ap-northeast-2" >> .env
            echo "S3_BUCKET_NAME=oneresume-storage-parkungjung" >> .env 
            echo "FRONTEND_URL=${{ secrets.FRONTEND_URL }}" >> .env
            
            # 소셜 로그인 관련 (추가됨)
            echo "KAKAO_CLIENT_ID=${{ secrets.KAKAO_CLIENT_ID }}" >> .env
            echo "KAKAO_CLIENT_SECRET=${{ secrets.KAKAO_CLIENT_SECRET }}" >> .env
            echo "KAKAO_REDIRECT_URI=${{ secrets.KAKAO_REDIRECT_URI }}" >> .env
            echo "NAVER_CLIENT_ID=${{ secrets.NAVER_CLIENT_ID }}" >> .env
            echo "NAVER_CLIENT_SECRET=${{ secrets.NAVER_CLIENT_SECRET }}" >> .env
            echo "NAVER_REDIRECT_URI=${{ secrets.NAVER_REDIRECT_URI }}" >> .env
            
            # AI 및 외부 API 관련 (추가됨)
            echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" >> .env
            echo "CAREERNET_API_KEY=${{ secrets.CAREERNET_API_KEY }}" >> .env
            
            # 고용24 (워크넷) API 키 5종 (신규 추가)
            echo "WORKNET_RECRUIT_KEY=${{ secrets.WORKNET_RECRUIT_KEY }}" >> .env
            echo "WORKNET_DEPT_KEY=${{ secrets.WORKNET_DEPT_KEY }}" >> .env
            echo "WORKNET_JOB_KEY=${{ secrets.WORKNET_JOB_KEY }}" >> .env
            echo "WORKNET_OCCU_KEY=${{ secrets.WORKNET_OCCU_KEY }}" >> .env
            echo "WORKNET_CODE_KEY=${{ secrets.WORKNET_CODE_KEY }}" >> .env
            
            # Prisma 세팅 및 DB 스키마 동기화 (군 관련 필드 생성 등)
            npx prisma generate
            npx prisma db push --accept-data-loss # DB 스키마 강제 동기화 (주의: 컬럼 변경 반영)
            
            # 기존 프로세스 정리 후 확실하게 다시 시작 (restart)
            pm2 restart all || pm2 start index.js --name "oneresume-api"
            
            # 제대로 떴는지 로그만 확인 (5초만 보여주고 종료)
            timeout 5s pm2 --lines 10 --no-daemon || true

      # 프론트엔드(S3) 배포 단계
      - name: Build and Deploy Frontend to S3
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          REACT_APP_API_URL: "https://api.oneresume.kr"
        run: |
          cd frontend
          npm install
          npm run build
          aws s3 sync build/ s3://oneresume-storage-parkungjung --delete --exclude "profiles/*" --region ap-northeast-2